<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}} | ZJIZHUANG</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
    <meta name="description" content="{{DESCRIPTION}}" />
    <link rel="canonical" href="{{CANONICAL_URL}}" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:url" content="{{CANONICAL_URL}}" />
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="ZJIZHUANG's Notes" />
    <meta property="og:locale" content="zh_CN" />
    {{OG_IMAGE_META}}
    <meta name="twitter:card" content="{{TWITTER_CARD_TYPE}}" />
    <meta name="twitter:title" content="{{TITLE}}" />
    <meta name="twitter:description" content="{{DESCRIPTION}}" />
    {{TWITTER_IMAGE_META}}
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": "{{TITLE_JSON}}",
        "description": "{{DESCRIPTION_JSON}}",
        "datePublished": "{{DATE_ISO}}",
        "url": "{{CANONICAL_URL}}",
        "author": {
          "@type": "Person",
          "name": "ZJIZHUANG",
          "url": "{{SITE_URL}}"
        },
        "publisher": {
          "@type": "Person",
          "name": "ZJIZHUANG"
        }
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lxgw-wenkai-web/1.520.0/style.min.css" integrity="sha512-VqbHLQtJ5icD77Z4HH8NsrtoRJlTAkOKdSrymwYZtZ1Ipbit8L/Pp8RIeHS2vpNk2bVOszUUDotVl7sK403sjw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../assets/styles.css" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="ZJIZHUANG's Notes"
      href="../feed.xml"
    />
    <script>
      // Runs before first paint — prevents theme flash
      (function () {
        var saved = localStorage.getItem("theme");
        var theme =
          saved ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body class="post-page">
    <!-- Liquid glass SVG filter -->
    <svg style="display: none" aria-hidden="true">
      <filter
        id="glass-distortion"
        x="0%"
        y="0%"
        width="100%"
        height="100%"
        filterUnits="objectBoundingBox"
      >
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.001 0.005"
          numOctaves="1"
          seed="17"
          result="turbulence"
        />
        <feComponentTransfer in="turbulence" result="mapped">
          <feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5" />
          <feFuncG type="gamma" amplitude="0" exponent="1" offset="0" />
          <feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5" />
        </feComponentTransfer>
        <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap" />
        <feSpecularLighting
          in="softMap"
          surfaceScale="5"
          specularConstant="1"
          specularExponent="100"
          lighting-color="white"
          result="specLight"
        >
          <fePointLight x="-200" y="-200" z="300" />
        </feSpecularLighting>
        <feComposite
          in="specLight"
          operator="arithmetic"
          k1="0"
          k2="1"
          k3="1"
          k4="0"
          result="litImage"
        />
        <feDisplacementMap
          in="SourceGraphic"
          in2="softMap"
          scale="200"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>

    <!-- Navbar -->
    <div class="navbar-wrapper">
      <nav class="navbar" id="navbar" aria-label="Site navigation">
        <div class="liquidGlass-effect" aria-hidden="true"></div>
        <div class="liquidGlass-tint" aria-hidden="true"></div>
        <div class="liquidGlass-shine" aria-hidden="true"></div>
        <div class="navbar-logo">
          <a href="../index.html" aria-label="Home">
            <img src="../assets/logo.png" alt="ZJIZHUANG" />
          </a>
          <div class="bio-card" role="tooltip">
            <div class="liquidGlass-effect" aria-hidden="true"></div>
            <div class="liquidGlass-tint" aria-hidden="true"></div>
            <div class="liquidGlass-shine" aria-hidden="true"></div>
            <div class="bio-card__body">
              <p class="bio-card__name">ZJIZHUANG</p>
              <div class="bio-card__divider"></div>
              <p class="bio-card__tagline">浪漫主义或野蛮</p>
              <p class="bio-card__role">非典型软件工程师</p>
              <ul class="bio-card__awards">
                <li>2022 年奥林匹克杯得主</li>
                <li>2019 年联合国地球卫士奖得主</li>
                <li>2008 年感动中国特别奖获得者</li>
                <li>2006 年时代周刊年度风云人物</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="navbar-toggle">{{THEME_TOGGLE}}</div>
      </nav>
    </div>

    <main>
      <!-- Post header -->
      <header
        class="post-header"
        style="view-transition-name: post-header-{{SLUG}}"
      >
        <h1>{{TITLE}}</h1>
        <p class="post-date">{{DATE}}</p>
      </header>

      <!-- Post content -->
      <article class="post-content">{{CONTENT}}</article>

      <!-- Post navigation -->
      {{POST_NAV}}

      <!-- Back to home -->
      <div class="post-back">
        <a href="../index.html" class="post-back__link">← 回到首页</a>
        <a href="../feed.xml" class="post-back__rss">RSS Feed</a>
      </div>
    </main>

    <script>
      // ── Sync button aria-pressed with saved theme on load ─
      document.addEventListener("DOMContentLoaded", function () {
        var isDark =
          document.documentElement.getAttribute("data-theme") === "dark";
        var btn = document.getElementById("theme-toggle-btn");
        if (btn) btn.setAttribute("aria-pressed", String(isDark));
        if (btn) btn.addEventListener("click", toggleTheme);
      });

      // ── Theme toggle: CSS fade (background-color transition on html) ─
      function toggleTheme() {
        var isDark =
          document.documentElement.getAttribute("data-theme") === "dark";
        var next = isDark ? "light" : "dark";
        var btn = document.getElementById("theme-toggle-btn");
        document.documentElement.setAttribute("data-theme", next);
        if (btn) btn.setAttribute("aria-pressed", String(!isDark));
        localStorage.setItem("theme", next);
      }
    </script>
  </body>
</html>
