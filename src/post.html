<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}} | ZJIZHUANG</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
    <meta name="description" content="{{DESCRIPTION}}" />
    <link rel="canonical" href="{{CANONICAL_URL}}" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:url" content="{{CANONICAL_URL}}" />
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="ZJIZHUANG's Notes" />
    <meta property="og:locale" content="zh_CN" />
    {{OG_IMAGE_META}}
    <meta name="twitter:card" content="{{TWITTER_CARD_TYPE}}" />
    <meta name="twitter:title" content="{{TITLE}}" />
    <meta name="twitter:description" content="{{DESCRIPTION}}" />
    {{TWITTER_IMAGE_META}}
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": "{{TITLE_JSON}}",
        "description": "{{DESCRIPTION_JSON}}",
        "datePublished": "{{DATE_ISO}}",
        "url": "{{CANONICAL_URL}}",
        "author": {
          "@type": "Person",
          "name": "ZJIZHUANG",
          "url": "{{SITE_URL}}"
        },
        "publisher": {
          "@type": "Person",
          "name": "ZJIZHUANG"
        }
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lxgw-wenkai-web/1.520.0/style.min.css" integrity="sha512-VqbHLQtJ5icD77Z4HH8NsrtoRJlTAkOKdSrymwYZtZ1Ipbit8L/Pp8RIeHS2vpNk2bVOszUUDotVl7sK403sjw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../assets/styles.css" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="ZJIZHUANG's Notes"
      href="../feed.xml"
    />
    <script>
      // Runs before first paint — prevents theme flash
      (function () {
        var saved = localStorage.getItem("theme");
        var theme =
          saved ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body class="post-page">
    {{NAVBAR}}

    <main>
      <!-- Post header -->
      <header
        class="post-header"
        style="view-transition-name: post-header-{{SLUG}}"
      >
        <h1>{{TITLE}}</h1>
        <p class="post-date">{{DATE}}</p>
      </header>

      <!-- Post content -->
      <article class="post-content">{{CONTENT}}</article>

      <!-- Post navigation -->
      {{POST_NAV}}

      <!-- Back to home -->
      <div class="post-back">
        <a href="../index.html" class="post-back__link">← 回到首页</a>
        <a href="../feed.xml" class="post-back__rss">RSS Feed</a>
      </div>
    </main>

    <script>
      // ── Sync button aria-pressed with saved theme on load ─
      document.addEventListener("DOMContentLoaded", function () {
        var isDark =
          document.documentElement.getAttribute("data-theme") === "dark";
        var btn = document.getElementById("theme-toggle-btn");
        if (btn) btn.setAttribute("aria-pressed", String(isDark));
        if (btn) btn.addEventListener("click", toggleTheme);
      });

      // ── Theme toggle: CSS fade (background-color transition on html) ─
      function toggleTheme() {
        var isDark =
          document.documentElement.getAttribute("data-theme") === "dark";
        var next = isDark ? "light" : "dark";
        var btn = document.getElementById("theme-toggle-btn");
        document.documentElement.setAttribute("data-theme", next);
        if (btn) btn.setAttribute("aria-pressed", String(!isDark));
        localStorage.setItem("theme", next);
      }
    </script>
  </body>
</html>
