<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZJIZHUANG's Notes</title>
    <meta
      name="description"
      content="ZJIZHUANG 的个人博客，非典型软件工程师的所思所想。"
    />
    <link rel="canonical" href="{{SITE_URL}}/" />
    <meta property="og:title" content="ZJIZHUANG's Notes" />
    <meta
      property="og:description"
      content="ZJIZHUANG 的个人博客，非典型软件工程师的所思所想。"
    />
    <meta property="og:url" content="{{SITE_URL}}/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ZJIZHUANG's Notes" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ZJIZHUANG's Notes" />
    <meta
      name="twitter:description"
      content="ZJIZHUANG 的个人博客，非典型软件工程师的所思所想。"
    />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lxgw-wenkai-web/1.520.0/style.min.css" integrity="sha512-VqbHLQtJ5icD77Z4HH8NsrtoRJlTAkOKdSrymwYZtZ1Ipbit8L/Pp8RIeHS2vpNk2bVOszUUDotVl7sK403sjw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="assets/styles.css" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="ZJIZHUANG's Notes"
      href="feed.xml"
    />
    <script>
      // Runs before first paint — prevents theme flash
      (function () {
        var saved = localStorage.getItem("theme");
        var theme =
          saved ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    {{NAVBAR}}

    <!-- Post List -->
    <main>
      <div class="post-list" role="list">{{POSTS_LIST}}</div>
      <footer class="site-footer">
        <span class="site-footer__name">ZJIZHUANG</span>
        <a href="feed.xml" class="site-footer__rss">RSS Feed</a>
      </footer>
    </main>

    <script>
      // ── Sync button aria-pressed with saved theme on load ─
      document.addEventListener("DOMContentLoaded", function () {
        var isDark =
          document.documentElement.getAttribute("data-theme") === "dark";
        var btn = document.getElementById("theme-toggle-btn");
        if (btn) btn.setAttribute("aria-pressed", String(isDark));
        // Wire up click → toggleTheme (replaces original CodePen listener)
        if (btn) btn.addEventListener("click", toggleTheme);
      });

      // ── Theme toggle: CSS fade (background-color transition on html) ─
      function toggleTheme() {
        var isDark =
          document.documentElement.getAttribute("data-theme") === "dark";
        var next = isDark ? "light" : "dark";
        var btn = document.getElementById("theme-toggle-btn");
        document.documentElement.setAttribute("data-theme", next);
        if (btn) btn.setAttribute("aria-pressed", String(!isDark));
        localStorage.setItem("theme", next);
      }
    </script>
  </body>
</html>
